name: Build & Deploy SpringBoot

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    name: Build and Deploy Spring Boot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4   # ✅ FIXED (was wrong action)
        with:
          distribution: "corretto"
          java-version: "21"

      - name: Unit Tests
        run: mvn -B test --file pom.xml

      - name: Build the Application
        run: |
          mvn clean
          mvn -B package --file pom.xml

      - name: Login to Docker Hub
        uses: docker/login-action@v3   # ✅ FIXED version
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME_FROM_GITHUB }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}  # ✅ FIXED typo

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5   # ✅ FIXED version
        with:
          context: .
          file: ./Dockerfile               # ✅ FIXED name (case-sensitive)
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME_FROM_GITHUB }}/test-springboot:latest
